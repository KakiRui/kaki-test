<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaki记数表-测试</title>
    <style>
        :root {
            --m-bg: #f5f3f0;
            --m-text: #5a5a5a;
            --m-border: #dcd7cf;
            --m-blue-main: #9cb1c0;
            --m-green-main: #a3b09c;
            --m-yellow-act: #e2d2ae;
            --m-green-rec: #dce0d9;
            --m-danger: #b09c9c;
        }

        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 12px; 
            background: var(--m-bg); 
            color: var(--m-text);
            min-height: 100vh;
        }
        
        .toolbar { 
            background: #ffffff; padding: 15px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(90,90,90,0.05); 
            margin-bottom: 12px;
        }

        /* 重点：锁死布局，防止按钮被挤小 */
        .input-row { 
            display: grid; 
            grid-template-columns: auto 60px 1fr 85px; 
            gap: 8px; 
            align-items: center; 
            margin-bottom: 10px;
        }
        .search-row {
            display: grid;
            grid-template-columns: 1fr 85px;
            gap: 8px;
            margin-bottom: 10px;
        }

        .batch-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px; white-space: nowrap; }
        .tab { padding: 6px 14px; background: #eeece8; border-radius: 20px; font-size: 13px; cursor: pointer; color: #888; border: 1px solid transparent; }
        .tab.active { background: var(--m-blue-main); color: white; border-color: #8da1b0; font-weight: bold; }
        .add-tab-btn { padding: 5px 12px; background: #fff; border: 1.2px dashed var(--m-blue-main); color: var(--m-blue-main); border-radius: 20px; font-size: 12px; font-weight: bold; flex-shrink: 0; }

        .button-group { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            border-top: 1px solid #f0edeb; padding-top: 10px;
        }
        .button-group button { padding: 10px; font-size: 12px; border-radius: 8px; border: 1px solid var(--m-border); background: none; color: var(--m-text); font-weight: bold; cursor: pointer; }

        .pool-box { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 4px 12px rgba(90,90,90,0.03); }
        .scroll-area { max-height: 40vh; overflow-y: auto; margin-top: 10px; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 10px; }
        
        .num-card { 
            height: 48px; border: 1.5px solid var(--m-blue-main); color: var(--m-blue-main); 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            border-radius: 8px; cursor: pointer; background: rgba(156, 177, 192, 0.05);
        }
        .num-card.selected { background: var(--m-yellow-act); border-color: #d1bf96; color: #7c6d4d; }
        .num-card.sold { background: #e9e7e4; border-color: #d8d3cd; color: #b0adb0; text-decoration: line-through; opacity: 0.7; }

        /* 磨砂玻璃置顶弹窗 - 缩短了动画时间 */
        .global-owner-tip {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--m-blue-main);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(156, 177, 192, 0.3);
            animation: tipFade 0.8s forwards; /* 总时长0.8秒 */
            transform: translate(-50%, -130%);
        }
        @keyframes tipFade { 
            0% { opacity: 0; transform: translate(-50%, -100%); } 
            20% { opacity: 1; transform: translate(-50%, -130%); }
            80% { opacity: 1; transform: translate(-50%, -130%); }
            100% { opacity: 0; transform: translate(-50%, -140%); }
        }

        .customer-card { background: #ffffff; border: 1.5px solid var(--m-border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .customer-card.can-receive { border-color: var(--m-green-main); background: var(--m-green-rec); }
        .cust-header { display: flex; justify-content: space-between; align-items: center; }
        .tag-box { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { background: var(--m-blue-main); color: white; padding: 4px 10px; border-radius: 6px; font-size: 13px; }
        
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--m-border); border-radius: 8px; font-size: 14px; background: #fffcf9; }
        .btn-action { background: var(--m-green-main) !important; color: white !important; border: none !important; height: 38px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-clear { background: #eeece8 !important; color: #888 !important; border: none !important; height: 38px; cursor: pointer; border-radius: 8px; font-weight: bold; }

        #statusMsg { background: var(--m-yellow-act); padding: 10px; border-radius: 8px; color: #7c6d4d; font-size: 13px; margin-bottom: 12px; text-align: center; border: 1px solid #d1bf96; }
        .footer-credit { text-align: center; font-size: 10px; color: #d1cdc8; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="batch-tabs">
        <button class="add-tab-btn" onclick="addNewBatch()">+ 新档位</button>
        <div id="batchTabsList" style="display:flex; gap:8px;"></div>
    </div>
    
    <div class="input-row">
        <span style="white-space:nowrap;">范围:1到</span>
        <input type="number" id="totalNum" value="50" onchange="updateBatchTotal()">
        <input type="text" id="custInput" placeholder="输入顾客名字">
        <button class="btn-action" onclick="addCustomer()">添加顾客</button>
    </div>

    <div class="search-row">
        <input type="text" id="searchBar" placeholder="🔍快速过滤顾客..." oninput="renderCustomers()">
        <button class="btn-clear" onclick="clearFilter()">✕ 清空</button>
    </div>

    <div class="button-group">
        <button onclick="resetSoldStatus()">重置本档数字</button>
        <button style="color:var(--m-danger);" onclick="initSystem()">清空所有档位</button>
    </div>
</div>

<div id="statusMsg" style="display:none;"></div>

<div class="pool-box">
    <h4 style="margin:0; color:#8a8a8a; display:flex; justify-content:space-between; align-items:center;">
        <span>🔢 数字表</span>
        <span style="font-size:11px; background:#f0f0f0; padding:2px 6px; border-radius:4px; cursor:pointer;" onclick="copyRemaining()">复制剩余号码</span>
    </h4>
    <div class="scroll-area">
        <div id="numberGrid" class="grid"></div>
    </div>
</div>

<div style="background:white; padding:18px; border-radius:15px; box-shadow:0 4px 12px rgba(90,90,90,0.03); margin-top:12px;">
    <h4 style="margin:0 0 15px 0; color:#8a8a8a;">👥 顾客清单</h4>
    <div id="customerList"></div>
    <div class="footer-credit">@Kaki 内部交流版本 禁止二传</div>
</div>

<script>
    let batches = JSON.parse(localStorage.getItem('kaki_v2_data')) || [{ id: '默认档', customers: [], total: 50 }];
    let currentIdx = 0;
    let selectedNums = [];

    function save() { localStorage.setItem('kaki_v2_data', JSON.stringify(batches)); }

    function handleTabClick(idx) {
        if (currentIdx === idx) {
            if (batches.length <= 1) return alert("至少保留一个档位哦！");
            if (confirm(`确定要删除当前的【${batches[idx].id}】档位吗？`)) {
                batches.splice(idx, 1);
                currentIdx = 0;
                renderAll();
                save();
            }
        } else {
            currentIdx = idx;
            selectedNums = [];
            renderAll();
        }
    }

    function addNewBatch() {
        const name = prompt("请输入新档位名称", "新档位");
        if(!name) return;
        batches.push({ id: name, customers: [], total: 50 });
        currentIdx = batches.length - 1;
        renderAll();
        save();
    }

    function clearFilter() {
        document.getElementById('searchBar').value = '';
        renderCustomers();
    }

    function updateBatchTotal() {
        batches[currentIdx].total = parseInt(document.getElementById('totalNum').value) || 50;
        renderGrid();
        save();
    }

    function showOwnerTip(event, num) {
        const owner = batches[currentIdx].customers.find(c => c.nums.flat().includes(num));
        if(!owner) return;
        
        const oldTip = document.querySelector('.global-owner-tip');
        if(oldTip) oldTip.remove();

        const tip = document.createElement('div');
        tip.className = 'global-owner-tip';
        tip.innerHTML = `拥有者: ${owner.name}`;
        
        const rect = event.target.getBoundingClientRect();
        tip.style.left = (rect.left + rect.width / 2) + 'px';
        tip.style.top = rect.top + 'px';
        
        document.body.appendChild(tip);
        setTimeout(() => { if(tip) tip.remove(); }, 800); // 0.8秒后彻底移除
    }

    function copyText(text) {
        const t = document.createElement("textarea");
        t.value = text; document.body.appendChild(t);
        t.select(); document.execCommand("copy");
        document.body.removeChild(t);
        alert("已复制！");
    }

    function copyRemaining() {
        const b = batches[currentIdx];
        const sold = b.customers.flatMap(c => c.nums.flat());
        let rem = [];
        for(let i=1; i<=b.total; i++) if(!sold.includes(i)) rem.push(i);
        copyText(`【${b.id}】余号[${rem.length}]:\n${rem.join(', ')}`);
    }

    function addCustomer() {
        const input = document.getElementById('custInput');
        if(!input.value.trim()) return;
        batches[currentIdx].customers.unshift({ name: input.value.trim(), nums: [] });
        input.value = '';
        renderAll();
        save();
    }

    function selectNumber(num) {
        const idx = selectedNums.indexOf(num);
        if (idx > -1) selectedNums.splice(idx, 1);
        else selectedNums.push(num);
        renderAll();
    }

    function bindToCustomer(index) {
        if(selectedNums.length === 0) return;
        batches[currentIdx].customers[index].nums.push([...selectedNums].sort((a,b) => a-b));
        selectedNums = [];
        renderAll();
        save();
    }

    function unbindNumber(cIdx, bIdx, num) {
        if(confirm(`确定删除数字 ${num} 吗？`)) {
            batches[currentIdx].customers[cIdx].nums[bIdx] = batches[currentIdx].customers[cIdx].nums[bIdx].filter(n => n !== num);
            if(batches[currentIdx].customers[cIdx].nums[bIdx].length === 0) batches[currentIdx].customers[cIdx].nums.splice(bIdx, 1);
            renderAll();
            save();
        }
    }

    function deleteCustomer(idx) { if(confirm(`彻底删除顾客 ${batches[currentIdx].customers[idx].name}？`)) { batches[currentIdx].customers.splice(idx, 1); renderAll(); save(); } }

    function initSystem() { if(confirm("警告：这将清空所有档位的所有数据！")) { batches = [{ id: '默认档', customers: [], total: 50 }]; currentIdx = 0; renderAll(); save(); } }
    function resetSoldStatus() { if(confirm("清空本档所有数字绑定？")) { batches[currentIdx].customers.forEach(c => c.nums = []); renderAll(); save(); } }

    function renderAll() {
        document.getElementById('totalNum').value = batches[currentIdx].total;
        const tabs = document.getElementById('batchTabsList');
        tabs.innerHTML = batches.map((b, i) => `<div class="tab ${i === currentIdx ? 'active' : ''}" onclick="handleTabClick(${i})">${b.id}</div>`).join('');
        renderGrid();
        renderCustomers();
        const msg = document.getElementById('statusMsg');
        msg.style.display = selectedNums.length > 0 ? 'block' : 'none';
        msg.innerText = `🎯 已选中 [ ${selectedNums.join(',')} ]，点人名绑定`;
    }

    function renderGrid() {
        const grid = document.getElementById('numberGrid');
        const soldNums = batches[currentIdx].customers.flatMap(c => c.nums.flat());
        grid.innerHTML = '';
        for(let i=1; i<=batches[currentIdx].total; i++) {
            const div = document.createElement('div');
            const isSold = soldNums.includes(i);
            div.className = `num-card ${isSold ? 'sold' : ''} ${selectedNums.includes(i) ? 'selected' : ''}`;
            div.innerText = i;
            div.onclick = isSold ? (e) => showOwnerTip(e, i) : () => selectNumber(i);
            grid.appendChild(div);
        }
    }

    function renderCustomers() {
        const list = document.getElementById('customerList');
        const search = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = '';
        batches[currentIdx].customers.forEach((c, cIdx) => {
            if(search && !c.name.toLowerCase().includes(search)) return;
            const card = document.createElement('div');
            card.className = `customer-card ${selectedNums.length > 0 ? 'can-receive' : ''}`;
            if(selectedNums.length > 0) card.onclick = () => bindToCustomer(cIdx);
            
            const tags = c.nums.map((batch, bIdx) => 
                batch.map(n => `<span class="tag" onclick="event.stopPropagation(); unbindNumber(${cIdx}, ${bIdx}, ${n})">${n}</span>`).join('')
            ).join('<span style="color:#b09c9c;margin:0 5px;">|</span>');

            card.innerHTML = `
                <div class="cust-header">
                    <div>
                        <span style="font-weight:bold;">👤 ${c.name}</span>
                        <span style="font-size:11px; background:var(--m-yellow-act); padding:1px 6px; border-radius:10px; margin-left:5px;">${c.nums.flat().length}张</span>
                    </div>
                    <span style="color:#ccc; font-size:11px;" onclick="event.stopPropagation(); deleteCustomer(${cIdx})">删除</span>
                </div>
                <div class="tag-box">${tags || '<small style="color:#ccc">点击绑定...</small>'}</div>
            `;
            list.appendChild(card);
        });
    }
    renderAll();
</script>
</body>
</html>
