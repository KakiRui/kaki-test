<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaki记数表-禁止二传</title>
    <style>
        :root {
            --m-bg: #f5f3f0;
            --m-text: #5a5a5a;
            --m-border: #dcd7cf;
            --m-blue-main: #9cb1c0;
            --m-green-main: #a3b09c;
            --m-yellow-act: #e2d2ae;
            --m-green-rec: #dce0d9;
            --m-danger: #b09c9c;
        }

        /* 整体布局优化：禁止页面原生滚动，全部交给内部模块 */
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 12px; 
            background: var(--m-bg); 
            color: var(--m-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }
        
        .toolbar { 
            background: #ffffff; padding: 15px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(90,90,90,0.05); 
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
        
        .batch-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 8px; white-space: nowrap; align-items: center; }
        .tab { padding: 8px 16px; background: #eeece8; border-radius: 20px; font-size: 13px; cursor: pointer; color: #888; border: 1px solid transparent; transition: 0.2s; }
        .tab.active { background: var(--m-blue-main); color: white; border-color: #8da1b0; font-weight: bold; }
        .add-tab-btn { padding: 6px 14px; background: #fff; border: 1.2px dashed var(--m-blue-main); color: var(--m-blue-main); border-radius: 20px; font-size: 12px; font-weight: bold; flex-shrink: 0; }

        .main-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex: 1; 
            min-height: 0; /* 关键：允许子元素溢出滚动 */
        }

        /* 第三点优化：数字池高度固定，不被压缩 */
        .pool-box { 
            background: white; padding: 15px; border-radius: 15px; 
            box-shadow: 0 4px 12px rgba(90,90,90,0.03);
            display: flex; flex-direction: column;
            height: 32vh; /* 固定数字池高度 */
            flex-shrink: 0;
        }

        /* 第三点优化：顾客清单模块占比变高，自动吃掉剩余所有高度 */
        .cust-box { 
            background: white; padding: 15px; border-radius: 15px; 
            box-shadow: 0 4px 12px rgba(90,90,90,0.03); 
            flex: 1; /* 核心：让清单模块占满剩余空间 */
            display: flex; 
            flex-direction: column;
            min-height: 0;
            margin-bottom: 5px;
        }

        .scroll-area {
            overflow-y: auto; 
            flex: 1; 
            margin-top: 10px; 
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }

        /* 网格和卡片 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 8px; }
        .num-card { 
            height: 46px; border: 1.5px solid var(--m-blue-main); color: var(--m-blue-main); 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            border-radius: 8px; cursor: pointer; background: rgba(156, 177, 192, 0.05);
            position: relative;
        }
        .num-card.selected { background: var(--m-yellow-act); border-color: #d1bf96; color: #7c6d4d; transform: scale(1.05); z-index: 5; }
        .num-card.sold { background: #e9e7e4; border-color: #d8d3cd; color: #b0adb0; text-decoration: line-through; opacity: 0.7; }

        /* 气泡提示 */
        .owner-tip {
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 6px;
            font-size: 12px; white-space: nowrap; z-index: 99; 
            animation: fadeInPop 0.2s ease-out;
        }
        .owner-tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: rgba(0,0,0,0.8); }
        @keyframes fadeInPop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 顾客清单卡片：找回第一点的复制功能 */
        .customer-card { 
            background: #fdfcfb; border: 1px solid var(--m-border); border-radius: 12px; 
            padding: 14px; margin-bottom: 12px;
        }
        .customer-card.can-receive { border: 2px solid var(--m-green-main); background: var(--m-green-rec); }
        .cust-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cust-name { font-weight: bold; font-size: 15px; }
        .cust-count { background: var(--m-yellow-act); color: #7c6d4d; border-radius: 12px; padding: 2px 8px; font-size: 11px; margin-left: 5px; }
        
        .tag-box { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .tag { background: var(--m-blue-main); color: white; padding: 4px 10px; border-radius: 6px; font-size: 13px; }
        .batch-sep { color: var(--m-danger); font-weight: bold; padding: 0 2px; }

        .btn-green { background: var(--m-green-main); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        input { padding: 10px; border: 1px solid var(--m-border); border-radius: 8px; background: #fffcf9; font-size: 14px; }
        
        #statusMsg { background: var(--m-yellow-act); padding: 10px; border-radius: 8px; color: #7c6d4d; font-size: 13px; margin-bottom: 10px; text-align: center; border: 1px solid #d1bf96; }
        .copy-btn-action { color: var(--m-blue-main); font-size: 12px; text-decoration: underline; cursor: pointer; }

        .footer-credit { text-align: center; font-size: 10px; color: #d1cdc8; padding: 15px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="batch-tabs">
        <button class="add-tab-btn" onclick="addNewBatch()">+ 新档位</button>
        <div id="tabsContainer" style="display:flex; gap:8px;"></div>
    </div>
    <div class="flex-row">
        <span style="font-size: 13px;">1 到</span>
        <input type="number" id="totalNum" value="50" style="width: 50px;" onchange="updateTotal()">
        <input type="text" id="custInput" placeholder="输入顾客名字" style="flex: 1;">
        <button class="btn-green" onclick="addCustomer()">添加</button>
    </div>
    <div class="flex-row">
        <input type="text" id="searchBar" placeholder="🔍 快速过滤顾客..." style="flex: 1;" oninput="renderCustomers()">
        <button onclick="resetBatch()" style="font-size:11px; background:none; border:1px solid #ccc; color:#999; border-radius:5px; padding:2px 5px;">清空本档</button>
    </div>
</div>

<div id="statusMsg" style="display:none;"></div>

<div class="main-container">
    <div class="pool-box">
        <h4 style="margin:0; display:flex; justify-content:space-between; align-items:center;">
            <span>🔢 数字表</span>
            <span style="font-size:11px; color:var(--m-blue-main);" onclick="copyRemaining()">复制余号</span>
        </h4>
        <div class="scroll-area">
            <div id="numberGrid" class="grid"></div>
        </div>
    </div>

    <div class="cust-box">
        <h4 style="margin:0;">👥 顾客清单</h4>
        <div class="scroll-area" id="listScroll">
            <div id="customerList"></div>
            <div class="footer-credit">@Kaki 内部交流版本 禁止二传</div>
        </div>
    </div>
</div>

<script>
    let batches = JSON.parse(localStorage.getItem('kaki_v22_data')) || [{ id: '默认档', customers: [], total: 50 }];
    let currentIdx = 0;
    let selectedNums = [];

    function save() { localStorage.setItem('kaki_v22_data', JSON.stringify(batches)); }

    // 第二点优化：点击当前档位确认删除
    function handleTabClick(idx) {
        if (currentIdx === idx) {
            if (batches.length <= 1) return alert("至少保留一个档位哦！");
            if (confirm(`⚠️ 确定要删除当前的【${batches[idx].id}】档位吗？数据将无法找回！`)) {
                batches.splice(idx, 1);
                currentIdx = 0;
                renderAll();
                save();
            }
        } else {
            currentIdx = idx;
            selectedNums = [];
            renderAll();
        }
    }

    function addNewBatch() {
        const name = prompt("请输入新档位名称", "新档位");
        if (!name) return;
        batches.push({ id: name, customers: [], total: 50 });
        currentIdx = batches.length - 1;
        renderAll();
        save();
    }

    function updateTotal() {
        batches[currentIdx].total = parseInt(document.getElementById('totalNum').value) || 50;
        renderGrid();
        save();
    }

    function addCustomer() {
        const input = document.getElementById('custInput');
        const name = input.value.trim();
        if (!name) return;
        batches[currentIdx].customers.unshift({ name: name, nums: [] });
        input.value = '';
        renderAll();
        save();
    }

    function selectNumber(num) {
        const i = selectedNums.indexOf(num);
        if (i > -1) selectedNums.splice(i, 1);
        else selectedNums.push(num);
        renderAll();
    }

    function bindToCustomer(cIdx) {
        if (selectedNums.length === 0) return;
        batches[currentIdx].customers[cIdx].nums.push([...selectedNums].sort((a,b)=>a-b));
        selectedNums = [];
        renderAll();
        save();
    }

    function unbind(cIdx, bIdx, num) {
        if(confirm(`删除数字 ${num} 吗？`)) {
            batches[currentIdx].customers[cIdx].nums[bIdx] = batches[currentIdx].customers[cIdx].nums[bIdx].filter(n => n !== num);
            if(batches[currentIdx].customers[cIdx].nums[bIdx].length === 0) batches[currentIdx].customers[cIdx].nums.splice(bIdx, 1);
            renderAll();
            save();
        }
    }

    function deleteCust(cIdx) {
        if(confirm(`删除顾客 ${batches[currentIdx].customers[cIdx].name}？`)) {
            batches[currentIdx].customers.splice(cIdx, 1);
            renderAll();
            save();
        }
    }

    function copyText(text) {
        const t = document.createElement("textarea");
        t.value = text; document.body.appendChild(t);
        t.select(); document.execCommand("copy");
        document.body.removeChild(t);
        alert("复制成功！");
    }

    // 第一点优化：找回复制成绩单功能
    function copyCustomer(cIdx) {
        const c = batches[currentIdx].customers[cIdx];
        if (c.nums.length === 0) return alert("还没有分配数字哦");
        const res = c.nums.map(b => b.join(' ')).join(' | ');
        copyText(`${c.name}的成绩单(  •̀ω•́  )ｷﾘｯ\n${res}`);
    }

    function copyRemaining() {
        const b = batches[currentIdx];
        const sold = b.customers.flatMap(c => c.nums.flat());
        let rem = [];
        for(let i=1; i<=b.total; i++) if(!sold.includes(i)) rem.push(i);
        copyText(`【${b.id}】剩余号码[${rem.length}个]:\n${rem.join(', ')}`);
    }

    function resetBatch() { if(confirm("清空本档所有数字和顾客？")) { batches[currentIdx].customers = []; renderAll(); save(); } }

    function showOwnerTip(e, num) {
        const owner = batches[currentIdx].customers.find(c => c.nums.flat().includes(num));
        if(!owner) return;
        document.querySelectorAll('.owner-tip').forEach(t => t.remove());
        const tip = document.createElement('div');
        tip.className = 'owner-tip'; tip.innerText = `拥有者: ${owner.name}`;
        e.currentTarget.appendChild(tip);
        setTimeout(() => tip.remove(), 2000);
    }

    function renderAll() {
        document.getElementById('totalNum').value = batches[currentIdx].total;
        renderTabs();
        renderGrid();
        renderCustomers();
        const msg = document.getElementById('statusMsg');
        msg.style.display = selectedNums.length > 0 ? 'block' : 'none';
        msg.innerHTML = `🎯 已选 [ ${selectedNums.join(',')} ]，点下方人名绑定`;
    }

    function renderTabs() {
        document.getElementById('tabsContainer').innerHTML = batches.map((b, i) => 
            `<div class="tab ${i === currentIdx ? 'active' : ''}" onclick="handleTabClick(${i})">${b.id}</div>`
        ).join('');
    }

    function renderGrid() {
        const grid = document.getElementById('numberGrid');
        const b = batches[currentIdx];
        const sold = b.customers.flatMap(c => c.nums.flat());
        grid.innerHTML = '';
        for (let i = 1; i <= b.total; i++) {
            const isSold = sold.includes(i);
            const isSelect = selectedNums.includes(i);
            const div = document.createElement('div');
            div.className = `num-card ${isSold ? 'sold' : ''} ${isSelect ? 'selected' : ''}`;
            div.innerText = i;
            div.onclick = isSold ? (e) => showOwnerTip(e, i) : () => selectNumber(i);
            grid.appendChild(div);
        }
    }

    function renderCustomers() {
        const list = document.getElementById('customerList');
        const search = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = '';
        batches[currentIdx].customers.forEach((c, cIdx) => {
            if (search && !c.name.toLowerCase().includes(search)) return;
            const card = document.createElement('div');
            card.className = `customer-card ${selectedNums.length > 0 ? 'can-receive' : ''}`;
            if (selectedNums.length > 0) card.onclick = () => bindToCustomer(cIdx);
            
            const tags = c.nums.map((batch, bIdx) => 
                batch.map(n => `<span class="tag" onclick="event.stopPropagation(); unbind(${cIdx}, ${bIdx}, ${n})">${n}</span>`).join('')
            ).join('<span class="batch-sep">|</span>');

            card.innerHTML = `
                <div class="cust-header">
                    <div>
                        <span class="cust-name">👤 ${c.name}</span>
                        <span class="cust-count">${c.nums.flat().length}张</span>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span class="copy-btn-action" onclick="event.stopPropagation(); copyCustomer(${cIdx})">复制成绩单</span>
                        <span style="color:#ccc; font-size:11px;" onclick="event.stopPropagation(); deleteCust(${cIdx})">删除</span>
                    </div>
                </div>
                <div class="tag-box">${tags || '<small style="color:#ccc">等待分配...</small>'}</div>
            `;
            list.appendChild(card);
        });
    }

    renderAll();
</script>
</body>
</html>
